apiVersion: apps/v1
kind: Deployment

metadata:
  name: patient-service
  namespace: healthconnect

spec:
  replicas: 1

  selector:
    matchLabels:
      app: patient-service

  template:
    metadata:
      labels:
        app: patient-service

    spec:
      containers:
      - name: patient-service
        image: healthconnect-ai-platform-patient-service:v1.0.4
        imagePullPolicy: IfNotPresent

        envFrom:
        - configMapRef:
            name: patient-config
        - secretRef:
            name: patient-secret

        ports:
        - containerPort: 5001

        volumeMounts:
        - name: patient-storage
          mountPath: /app/data

        readinessProbe:
          httpGet: 
            path: /patients/health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /patients/health
            port: 5001
          initialDelaySeconds: 15
          periodSeconds: 20

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

      volumes:
      - name: patient-storage
        persistentVolumeClaim:
          claimName: patient-pvc