apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-service
  namespace: healthconnect

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-service

  template:
    metadata:
      labels:
        app: ai-service

    spec:
      containers:
      - name: ai-service
        image: healthconnect-ai-platform-ai-service:v1.0.3
        imagePullPolicy: IfNotPresent

        envFrom:
        - configMapRef:
            name: ai-config
        - secretRef:
            name: ai-secret

        ports:
        - containerPort: 5004

        readinessProbe:
          httpGet: 
            path: /ai/health
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /ai/health
            port: 5004
          initialDelaySeconds: 15
          periodSeconds: 20

        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"